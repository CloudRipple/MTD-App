name: Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      release_name:
        description: "Release title. Defaults to the tag name."
        required: false
        type: string
      draft:
        description: "Create as draft release"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark as pre-release"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos
            os: macos-latest
            asset_name: MTDSubtitleApp-${{ inputs.tag_name }}-macos
          - platform: linux
            os: ubuntu-latest
            asset_name: MTDSubtitleApp-${{ inputs.tag_name }}-linux
          - platform: windows
            os: windows-latest
            asset_name: MTDSubtitleApp-${{ inputs.tag_name }}-windows.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: brew install libass pkg-config

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libass-dev nasm yasm

      - name: Install Windows FFmpeg dependencies
        if: matrix.platform == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit
          update: true
          install: >-
            git
            make
            diffutils
            nasm
            yasm
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-libass
            mingw-w64-x86_64-pkgconf

      - name: Build macOS package
        if: matrix.platform == 'macos'
        run: scripts/build-macos.sh

      - name: Build Linux package
        if: matrix.platform == 'linux'
        run: scripts/build-linux.sh

      - name: Build Windows package
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          CHERE_INVOKING: "1"
          MSYSTEM: MINGW64
          MSYS2_BASH: C:\msys64\usr\bin\bash.exe
          MSYS2_PATH_TYPE: inherit
        run: .\scripts\build-windows.ps1

      - name: Collect macOS executable
        if: matrix.platform == 'macos'
        run: |
          mkdir -p release-assets
          cp dist/macos/MTDSubtitleApp.app/Contents/MacOS/MTDSubtitleApp "release-assets/${{ matrix.asset_name }}"
          chmod +x "release-assets/${{ matrix.asset_name }}"

      - name: Collect Linux executable
        if: matrix.platform == 'linux'
        run: |
          mkdir -p release-assets
          cp dist/linux/MTDSubtitleApp "release-assets/${{ matrix.asset_name }}"
          chmod +x "release-assets/${{ matrix.asset_name }}"

      - name: Collect Windows executable
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item dist\windows\MTDSubtitleApp.exe "release-assets\${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: release-assets/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          target_commitish: ${{ github.sha }}
          name: ${{ inputs.release_name || inputs.tag_name }}
          draft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: release-assets/*
